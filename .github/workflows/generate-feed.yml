name: Star AI 日报 Feed 生成

on:
  schedule:
    # 每天北京时间 9:30 (UTC 1:30)
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '获取内容类型'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: cd scripts && npm install

      - name: 生成 Feed
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" != "all" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }}
          else
            cd scripts && node generate-feed.js
          fi

      - name: 提交到本仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-daily.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: 更新 feed-daily.json $(date -u +%Y-%m-%d)"
          git push

      - name: 同步到 Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git remote add gitee https://oauth2:${GITEE_TOKEN}@gitee.com/stargod0812/star-ai-daily.git 2>/dev/null || true
          git push gitee HEAD:master --force
