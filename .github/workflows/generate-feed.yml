name: Star AI 日报 Feed 生成

on:
  schedule:
    - cron: '30 0 * * *'   # 北京时间 08:30
    - cron: '30 1 * * *'   # 北京时间 09:30
    - cron: '0 6 * * *'    # 北京时间 14:00
    - cron: '0 10 * * *'   # 北京时间 18:00
  workflow_dispatch:
    inputs:
      mode:
        description: '获取内容类型'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: cd scripts && npm install

      - name: 生成 Feed
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" != "all" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }}
          else
            cd scripts && node generate-feed.js
          fi

      - name: 提交并推送 Feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: 更新 feed [skip ci]"
          git push
